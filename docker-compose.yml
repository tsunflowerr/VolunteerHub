services:
  redis:
    image: redis:latest
    container_name: volunteerhub-redis
    restart: no
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - volunteerhub-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: volunteerhub-backend
    restart: no
    ports:
      - '4000:4000'
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - volunteerhub-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: volunteerhub-frontend
    restart: no
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:4000/api
      - DOCKER_ENV=true
    networks:
      - volunteerhub-network

volumes:
  redis_data:

networks:
  volunteerhub-network:
    driver: bridge
