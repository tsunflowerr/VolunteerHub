services:
  mongodb:
    image: mongo:latest
    container_name: volunteerhub-mongodb
    restart: always
    ports:
      - '27017:27017'
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password123
      - MONGO_INITDB_DATABASE=volunteerhub
    volumes:
      - mongodb_data:/data/db
    networks:
      - volunteerhub-network

  redis:
    image: redis:latest
    container_name: volunteerhub-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - volunteerhub-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: volunteerhub-backend
    restart: always
    ports:
      - '4000:4000'
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/volunteerhub?authSource=admin
    depends_on:
      - redis
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - volunteerhub-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: volunteerhub-frontend
    restart: always
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:4000/api
    networks:
      - volunteerhub-network

volumes:
  mongodb_data:
  redis_data:

networks:
  volunteerhub-network:
    driver: bridge
